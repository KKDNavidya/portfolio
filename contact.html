<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Me</title>

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <div class="logo">
        DN<span>.</span>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="skills.html">Certificates & Skills</a>
        <a href="portfolio.html">Projects/a>
        <a href="contact.html" class="active">Contact</a>
    </nav>

</header>

<section class="contact" id="contact">

    <h2 class="heading">Contact <span>Me</span></h2>

    <div class="contact-container">

        <!-- Left Side -->

        <div class="contact-info">

            <h3>Get in Touch</h3>

            <p>
                If you have an internship opportunity, project collaboration,
                or any inquiries, feel free to contact me.
            </p>

            <div class="info-box">
                <i class='bx bxs-envelope'></i>
                <div>
                    <h4>Email</h4>
                    <p>dilkinavidya2@gmail.com</p>
                </div>
            </div>

            <div class="info-box">
                <i class='bx bxs-phone'></i>
                <div>
                    <h4>Phone</h4>
                    <p>+94 71 639 4227</p>
                </div>
            </div>

            <div class="info-box">
                <i class='bx bxs-map'></i>
                <div>
                    <h4>Location</h4>
                    <p>Sri Lanka</p>
                </div>
            </div>

            <hr>

            <h4>Follow Me</h4>

            <div class="social-icons">

                <a href="https://github.com/" target="_blank">
                    <i class='bx bxl-github'></i>
                </a>

                <a href="https://linkedin.com/in/dilki-navidya"
                   target="_blank">
                    <i class='bx bxl-linkedin-square'></i>
                </a>

            </div>

        </div>

        <!-- Right Side -->

        <div class="contact-form">

            <h3>Send Me a Message</h3>

            <form>

                <input type="text"
                placeholder="Your Name" required>

                <input type="email"
                placeholder="Your Email" required>

                <input type="text"
                placeholder="Subject">

                <textarea rows="7"
                placeholder="Your Message"></textarea>

                <button type="submit" class="btn">
                    <i class='bx bx-send'></i>
                    Send Message
                </button>

            </form>

        </div>

    </div>

</section>

</body>
</html>
